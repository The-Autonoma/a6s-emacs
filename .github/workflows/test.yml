name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version: ['28.2', '29.1', '30.1']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Install Cask
        uses: cask/setup-cask@master
        with:
          version: snapshot

      - name: Install dependencies
        run: cask install

      - name: Byte compile
        run: make compile

      - name: Lint
        run: make lint

      - name: Test with coverage
        run: make test
